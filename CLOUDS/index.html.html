<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clouds Weather Pro</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4da0ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://animated-fluent-emoji.vercel.app/emojis/Cloud/512.gif">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #4da0ff;
            --bg-bottom: #003366;
            --card-bg: #ffffff; 
            --sheet-bg: #f7f9fc; 
            --inner-card: #70a1ff; 
            --accent-primary: #007AFF;
            --accent-gradient: linear-gradient(135deg, #007AFF 0%, #0051FF 100%);
            --temp-gradient: linear-gradient(to right, #4FACFE 0%, #FF4B2B 100%);
            --text-ui: #1a1a1a; 
            --text-muted: #666666;
            --btn-bg: #e1e5ea;
            --text-hero: #ffffff;
            --radius-lg: 48px;
            --radius-md: 100px;
            --radius-pill: 100px;
        }

        body.dark-theme {
            --bg-top: #0a1128;
            --bg-bottom: #00040a;
            --card-bg: #1c1c1e; 
            --sheet-bg: #000000;
            --inner-card: #1e3a8a; 
            --accent-primary: #3a86ff;
            --text-ui: #ffffff;
            --text-muted: #aaaaaa;
            --btn-bg: #2c2c2e;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-bottom) 100%); background-attachment: fixed; font-family: 'Outfit', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; transition: background 0.5s ease; }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 1.5rem 1.5rem 180px 1.5rem; }

        .nav-fade-overlay { position: fixed; bottom: 0; left: 0; right: 0; height: 180px; background: linear-gradient(to top, var(--bg-bottom) 30%, transparent 100%); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); mask-image: linear-gradient(to top, black 40%, transparent 100%); -webkit-mask-image: linear-gradient(to top, black 40%, transparent 100%); pointer-events: none; z-index: 850; }

        .bottom-nav-bar { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); width: calc(100% - 3rem); max-width: 440px; height: 74px; background-color: var(--card-bg); border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 900; }
        .nav-btn { background: var(--accent-gradient); border: none; width: 56px; height: 56px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-btn svg { width: 28px; height: 28px; fill: white; }
        .location-pill-card { background: var(--accent-gradient); padding: 0.6rem 1.2rem; border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-grow: 0.8; height: 56px; max-width: 240px; }
        #city-label { font-weight: 800; color: white; font-size: 1.05rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .hero-section { margin-top: 4rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center;}
        .main-icon-container { width: 340px; height: 340px; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-icon-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 25px 40px rgba(0,0,0,0.3)); z-index: 2; border: none; opacity: 1;}
        .icon-fallback { position: absolute; font-size: 10rem; z-index: 1; display: flex; align-items: center; justify-content: center; opacity: 1; }
        .temp-large { font-size: 8.5rem; font-weight: 800; line-height: 1; letter-spacing: -4px; margin: 0; margin-bottom: 10rem; color: #fff; }
        .hero-sub-row { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 5px 12px; gap: 10px; }
        .hero-pill { background: var(--accent-gradient); padding: 0.8rem 1.4rem; border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: center; color: white; height: 54px; }
        .scale-pill-wrapper { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1rem; color: white; }
        .temp-pill-track { width: 90px; height: 14px; background: var(--temp-gradient); border-radius: var(--radius-pill); position: relative; }
        .temp-dot { width: 18px; height: 18px; background: #FFD60A; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); transition: left 0.5s ease; border: 2px solid #fff; }

        .white-card { background: var(--card-bg); border-radius: var(--radius-lg); margin-bottom: 1.5rem; color: var(--text-ui); padding: 2.5rem 2.2rem; }
        .section-label { text-transform: uppercase; font-size: 1.1rem; font-weight: 800; color: var(--text-muted); margin-bottom: 1.8rem; margin-top: 0; display: block; text-align: center; }
        .hourly-scroll { display: flex; overflow-x: auto; gap: 14px; padding-bottom: 5px; scrollbar-width: none; }
        .hour-card { background: var(--accent-gradient); color: white; min-width: 110px; padding: 1.5rem 0.5rem; border-radius: var(--radius-md); text-align: center; flex-shrink: 0; transition: filter 0.3s ease; }
        .hour-card b { font-size: 1.7rem; }
        .hour-card.active { background: #fff; color: #0051FF; border: 3px solid var(--accent-primary); }

        .weekly-list { display: flex; flex-direction: column; gap: 12px; }
        .day-card { background: var(--accent-gradient); color: white; padding: 1.2rem 1.8rem; border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center; min-height: 100px; border: 1px solid rgba(0,0,0,0.05); transition: filter 0.3s ease; }
        .day-card img, .hour-card img { width: 70px; height: 70px; object-fit: contain; }
        .weekly-temp { font-weight: 800; font-size: 1.7rem; flex: 1; text-align: right; margin-right: 15px; }

        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(8px); }
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        .bottom-sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--sheet-bg); z-index: 1001; border-radius: 48px 48px 0 0; padding: 2rem 1.5rem; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 90vh; overflow-y: auto; color: var(--text-ui); }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-handle { width: 45px; height: 5px; background: var(--text-muted); border-radius: 10px; margin: 0 auto 1.5rem; opacity: 0.4; }

        .settings-row { background: var(--card-bg); border-radius: var(--radius-pill); margin-bottom: 12px; overflow: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(128,128,128,0.08); min-height: 60px; max-height: 60px; padding: 0; }
        .settings-header { display: flex; position: relative; justify-content: center; align-items: center; cursor: pointer; font-weight: 700; font-size: 1.1rem; color: var(--text-ui); height: 60px; padding: 0 3rem; }
        .settings-options { opacity: 0; pointer-events: none; transition: 0.3s; padding: 0 2rem; margin-top: 0; text-align: center; }
        .settings-indicator { position: absolute; right: 1.5rem; width: 18px; height: 18px; transition: transform 0.4s ease; display: flex; align-items: center; justify-content: center; }
        .settings-indicator svg { width: 100%; height: 100%; fill: none; stroke: var(--text-ui); stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
        .settings-row.expanded { max-height: 500px; border-radius: 40px; }
        .settings-row.expanded .settings-options { opacity: 1; pointer-events: all; padding-bottom: 1.5rem; }
        .settings-row.expanded .settings-indicator { transform: rotate(180deg); }
        .settings-flex-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }

        .material-btn { background: var(--btn-bg); padding: 1.1rem 1.6rem; border-radius: var(--radius-pill); border: none; color: var(--text-ui); font-weight: 700; cursor: pointer; transition: 0.2s; min-width: 100px; }
        .material-btn.active { background: var(--accent-primary) !important; color: white !important; }

        .save-btn-container { display: flex; justify-content: center; margin-top: 2rem; }
        .save-btn { min-width: 200px; background: var(--accent-primary) !important; color: white !important; }

        .search-input { width: 100%; padding: 1.4rem; border-radius: 100px; border: none; background: var(--card-bg); color: var(--text-ui); font-size: 1.1rem; outline: none; margin-bottom: 1rem; border: 1px solid rgba(128,128,128,0.1); }
        .fav-item { background: var(--accent-gradient); color: white; padding: 1.2rem 1.5rem; border-radius: 100px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .aqi-container { transition: all 0.4s ease; color: white !important;}
        .aqi-good { background: #E6F9F1; color: #007D4C !important; }
        .aqi-fair { background: #FFF9E6; color: #997A00 !important; }
        .aqi-poor { background: #FCEBEB; color: #C92A2A !important; }
        body.dark-theme .aqi-good { background: #0b2e21; color: #52f9b1 !important; }
        body.dark-theme .aqi-fair { background: #2d2605; color: #ffd633 !important; }
        body.dark-theme .aqi-poor { background: #2a0a0a; color: #ff6b6b !important; }
    </style>
</head>
<body class="light-theme">

    <div class="sheet-overlay" id="overlay" onclick="closeAllSheets()"></div>
    <div class="nav-fade-overlay"></div>

    <nav class="bottom-nav-bar">
        <button class="nav-btn" onclick="requestCurrentLocation()">
            <svg viewBox="0 0 24 24"><path d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M3.05,13H1V11H3.05C3.5,6.83 6.83,3.5 11,3.05V1H13V3.05C17.17,3.5 20.5,6.83 20.95,11H23V13H20.95C20.5,17.17 17.17,20.5 13,20.95V23H11V20.95C6.83,20.5 3.5,17.17 3.05,13M12,5A7,7 0 0,0 5,12A7,7 0 0,0 12,19A7,7 0 0,0 19,12A7,7 0 0,0 12,5Z" /></svg>
        </button>
        <div class="location-pill-card" onclick="openSheet('location-sheet')"><div id="city-label">Detecting...</div></div>
        <button class="nav-btn" onclick="openSheet('settings-sheet')">
            <svg viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.32 14.87,5.07L14.49,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.51,2.42L9.13,5.07C8.53,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.53,18.67 9.13,18.93L9.51,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.49,21.58L14.87,18.93C15.47,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" /></svg>
        </button>
    </nav>

    <div class="bottom-sheet" id="location-sheet">
        <div class="sheet-handle"></div>
        <h2 style="font-weight: 800; margin-bottom: 1rem; color: var(--text-ui); text-align: center;">Location</h2>
        <input type="text" id="city-input" class="search-input" placeholder="Search for a city...">
        <div id="results"></div>
        <h3 style="font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted); margin-top: 2rem; text-align: center;">Favorites</h3>
        <div id="favorites-list"></div>
        <div class="save-btn-container"><button class="material-btn save-btn" onclick="closeAllSheets()">Done</button></div>
    </div>

    <div class="bottom-sheet" id="settings-sheet">
        <div class="sheet-handle"></div>
        <h2 style="font-weight: 800; margin-bottom: 1.5rem; color: var(--text-ui); text-align: center;">Settings</h2>
        <div class="settings-row" onclick="toggleAccordion(this)"><div class="settings-header">Appearance <span class="settings-indicator"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span></div><div class="settings-options" id="theme-options"><div class="settings-flex-container"><button class="material-btn" id="theme-light" onclick="event.stopPropagation(); setTheme('light')">Day</button><button class="material-btn" id="theme-dark" onclick="event.stopPropagation(); setTheme('dark')">Night</button><button class="material-btn" id="theme-auto" onclick="event.stopPropagation(); setTheme('auto')">Auto</button></div></div></div>
        <div class="settings-row" onclick="toggleAccordion(this)"><div class="settings-header">Temperature Unit <span class="settings-indicator"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span></div><div class="settings-options" id="unit-options"><div class="settings-flex-container"><button class="material-btn" id="unit-c" onclick="event.stopPropagation(); setUnit('C')">Celsius</button><button class="material-btn" id="unit-f" onclick="event.stopPropagation(); setUnit('F')">Fahrenheit</button></div></div></div>
        <div class="settings-row" onclick="toggleAccordion(this)"><div class="settings-header">Time Format <span class="settings-indicator"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span></div><div class="settings-options" id="time-options"><div class="settings-flex-container"><button class="material-btn" id="time-24h" onclick="event.stopPropagation(); setTimeFormat('24h')">24-Hour</button><button class="material-btn" id="time-12h" onclick="event.stopPropagation(); setTimeFormat('12h')">12-Hour</button></div></div></div>
        <div class="settings-row" onclick="toggleAccordion(this)"><div class="settings-header">About <span class="settings-indicator"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span></div><div class="settings-options" style="font-size: 0.95rem; line-height: 1.6; color: var(--text-muted); text-align: center;"><p style="margin:0"><strong>Version:</strong> 2.5 Pro</p><p style="margin:5px 0"><strong>Data:</strong> Open-Meteo API</p><p style="margin:0"><strong>Icons:</strong> Microsoft Fluent System</p></div></div>
        <div class="save-btn-container"><button class="material-btn save-btn" onclick="closeAllSheets()">Save</button></div>
    </div>

    <div class="app-container" id="main-app">
        <section class="hero-section">
            <div class="main-icon-container" id="hero-icon-target"></div>
            <h1 class="temp-large" id="main-temp">--°</h1>
            <div class="hero-sub-row"><div class="hero-pill"><span id="main-cond">--</span></div><div class="hero-pill"><div class="scale-pill-wrapper"><span id="val-lo">--°</span><div class="temp-pill-track"><div class="temp-dot" id="temp-dot"></div></div><span id="val-hi">--°</span></div></div></div>
        </section>
        <div class="white-card"><span class="section-label">24-Hour Forecast</span><div class="hourly-scroll" id="hourly-list"></div></div>
        <div class="white-card"><span class="section-label">7-Day Forecast</span><div class="weekly-list" id="weekly-list"></div></div>
        <div class="white-card aqi-container" id="aqi-card" style="display:flex; align-items:center; justify-content:space-between; padding: 1.8rem 2.2rem;">
            <div><span class="section-label" style="color:inherit; opacity:0.7; text-align: left; font-size: 0.75rem;">Air Quality</span><span id="stat-aqi" style="font-size: 2.5rem; font-weight: 800;">--</span></div>
            <div style="text-align: right;"><span id="aqi-desc" style="display:block; font-weight:700; font-size:1.2rem;">--</span><span style="font-size:0.75rem; opacity:0.8;">US AQI Index</span></div>
        </div>
    </div>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log("SW registration failed", err));
            });
        }

        let weatherCache = null;
        let favorites = JSON.parse(localStorage.getItem('clouds_favs')) || [];
        let currentTheme = localStorage.getItem('clouds_theme') || 'auto';
        let unit = localStorage.getItem('clouds_unit') || 'C';
        let is12h = localStorage.getItem('clouds_timeformat') === '12h';

        const fluentBase = "https://animated-fluent-emoji.vercel.app/emojis/";
        const iconMap = { sunny: { url: fluentBase + "Sun/512.gif", emoji: "☀️" }, partlyCloudy: { url: fluentBase + "Sun%20Behind%20Cloud/512.gif", emoji: "⛅" }, cloudy: { url: fluentBase + "Cloud/512.gif", emoji: "☁️" }, fog: { url: fluentBase + "Fog/512.gif", emoji: "🌫️" }, rain: { url: fluentBase + "Cloud%20with%20Rain/512.gif", emoji: "🌧️" }, snow: { url: fluentBase + "Cloud%20with%20Snow/512.gif", emoji: "❄️" }, storm: { url: fluentBase + "Cloud%20with%20Lightning%20and%20Rain/512.gif", emoji: "⛈️" } };

        function getIconData(code) { if (code <= 1) return iconMap.sunny; if (code <= 2) return iconMap.partlyCloudy; if (code <= 3) return iconMap.cloudy; if (code <= 48) return iconMap.fog; if (code <= 67) return iconMap.rain; if (code <= 77) return iconMap.snow; return iconMap.storm; }
        function toggleAccordion(el) { const isExpanded = el.classList.contains('expanded'); document.querySelectorAll('.settings-row').forEach(row => row.classList.remove('expanded')); if (!isExpanded) el.classList.add('expanded'); }
        function updateHeroIcon(code) { const data = getIconData(code); const target = document.getElementById('hero-icon-target'); target.innerHTML = `<span class="icon-fallback">${data.emoji}</span><img src="${data.url}" class="main-icon-img" alt="Weather" onerror="this.style.display='none';">`; }
        function openSheet(id) { document.getElementById('overlay').classList.add('active'); document.getElementById(id).classList.add('active'); if(id === 'location-sheet') renderFavorites(); updateSettingsUI(); }
        function closeAllSheets() { document.getElementById('overlay').classList.remove('active'); document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active')); }
        function setTheme(t) { currentTheme = t; localStorage.setItem('clouds_theme', t); applyTheme(); updateSettingsUI(); }
        function applyTheme() { const isDark = (currentTheme === 'dark') || (currentTheme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches); document.body.classList.toggle('dark-theme', isDark); }
        function setUnit(u) { unit = u; localStorage.setItem('clouds_unit', u); updateSettingsUI(); if(weatherCache) refreshUI(); }
        function setTimeFormat(f) { is12h = f === '12h'; localStorage.setItem('clouds_timeformat', f); updateSettingsUI(); if(weatherCache) renderHourly(weatherCache.hourly); }
        function updateSettingsUI() { document.querySelectorAll('#theme-options .material-btn').forEach(b => b.classList.toggle('active', b.id === `theme-${currentTheme}`)); document.querySelectorAll('#unit-options .material-btn').forEach(b => b.classList.toggle('active', b.id === `unit-${unit.toLowerCase()}`)); document.querySelectorAll('#time-options .material-btn').forEach(b => b.classList.toggle('active', b.id === `time-${is12h ? '12h' : '24h'}`)); }
        function requestCurrentLocation() { document.getElementById('city-label').innerText = "Locating..."; if (navigator.geolocation) { navigator.geolocation.getCurrentPosition((pos) => { document.getElementById('city-label').innerText = "My Location"; fetchWeather(pos.coords.latitude, pos.coords.longitude); }, (err) => { document.getElementById('city-label').innerText = "Stockholm"; fetchWeather(59.32, 18.06); }); } }

        async function fetchWeather(lat, lon) {
            try {
                const [wRes, aRes] = await Promise.all([ fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`), fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`) ]);
                weatherCache = { ...(await wRes.json()), aqi: (await aRes.json()).current.us_aqi };
                refreshUI();
            } catch (err) { console.log("Fetch error"); }
        }

        function refreshUI() {
            const data = weatherCache; const cur = data.current_weather; const conv = (t) => unit === 'F' ? Math.round((t * 9/5) + 32) : Math.round(t);
            document.getElementById('main-temp').innerText = `${conv(cur.temperature)}°`;
            const conditionMap = { 0: "Clear Skies", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast", 45: "Foggy", 61: "Rainy", 95: "Stormy" };
            document.getElementById('main-cond').innerText = conditionMap[cur.weathercode] || "Clear";
            updateHeroIcon(cur.weathercode);
            const hi = data.daily.temperature_2m_max[0], lo = data.daily.temperature_2m_min[0];
            document.getElementById('val-lo').innerText = `${conv(lo)}°`; document.getElementById('val-hi').innerText = `${conv(hi)}°`;
            const range = hi - lo; const percent = range === 0 ? 0.5 : (cur.temperature - lo) / range;
            document.getElementById('temp-dot').style.left = `${Math.max(10, Math.min(90, percent * 100))}%`;
            const aCard = document.getElementById('aqi-card'); aCard.className = 'white-card aqi-container ' + (data.aqi <= 50 ? 'aqi-good' : data.aqi <= 100 ? 'aqi-fair' : 'aqi-poor');
            document.getElementById('stat-aqi').innerText = data.aqi; document.getElementById('aqi-desc').innerText = data.aqi <= 50 ? "Excellent" : data.aqi <= 100 ? "Fair" : "Poor";
            renderHourly(data.hourly); renderWeekly(data.daily);
        }

        function renderHourly(hourlyData) {
            const list = document.getElementById('hourly-list'); list.innerHTML = '';
            const startHour = new Date().getHours() + 1;
            const conv = (t) => unit === 'F' ? Math.round((t * 9/5) + 32) : Math.round(t);
            hourlyData.temperature_2m.slice(startHour, startHour + 24).forEach((t, i) => {
                const hourIndex = (startHour + i) % 24; const card = document.createElement('div'); card.className = `hour-card`;
                let h = hourIndex % 12 || 12; let ampm = hourIndex >= 12 ? 'PM' : 'AM';
                let timeStr = is12h ? `${h}${ampm}` : `${hourIndex}:00`;
                const iconData = getIconData(hourlyData.weathercode[startHour + i]);
                card.innerHTML = `<span style="font-size:0.75rem; font-weight:800; opacity:0.8;">${timeStr}</span><div style="position:relative; width:70px; height:70px; margin:5px auto;"><span style="position:absolute; inset:0; font-size:2.8rem; display:flex; align-items:center; justify-content:center;">${iconData.emoji}</span><img src="${iconData.url}" style="position:absolute; inset:0; width:100%; height:100%; z-index:2; border:none;" onerror="this.style.opacity='0'"></div><b style="font-size: 1.7rem;">${conv(t)}°</b>`;
                list.appendChild(card);
            });
        }

        function renderWeekly(dailyData) {
            const list = document.getElementById('weekly-list'); list.innerHTML = '';
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']; const today = new Date().getDay();
            const conv = (t) => unit === 'F' ? Math.round((t * 9/5) + 32) : Math.round(t);
            for(let i=1; i<7; i++) {
                const dayIdx = (today + i) % 7; const iconData = getIconData(dailyData.weathercode[i]); const card = document.createElement('div'); card.className = 'day-card';
                card.innerHTML = `<span style="font-weight:700; width:100px; text-align: left; color:white;">${i === 1 ? 'Tomorrow' : days[dayIdx]}</span><span class="weekly-temp">${conv(dailyData.temperature_2m_max[i])}° <small style="color:rgba(255,255,255,0.7); font-weight:400; font-size: 1.1rem;">/ ${conv(dailyData.temperature_2m_min[i])}°</small></span><div style="position:relative; width:70px; height:70px;"><span style="position:absolute; inset:0; font-size:2.5rem; display:flex; align-items:center; justify-content:center;">${iconData.emoji}</span><img src="${iconData.url}" style="position:absolute; inset:0; width:100%; height:100%; z-index:2;" onerror="this.style.opacity='0'"></div>`;
                list.appendChild(card);
            }
        }

        document.getElementById('city-input').addEventListener('input', async (e) => {
            if (e.target.value.length < 3) return;
            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${e.target.value}&count=5`);
            const data = await res.json(); const resultsDiv = document.getElementById('results'); resultsDiv.innerHTML = '';
            data.results?.forEach(loc => {
                const isFav = favorites.some(f => f.id === loc.id); const d = document.createElement('div'); d.className = 'material-btn'; d.style.textAlign = "left";
                d.innerHTML = `<span onclick='selectCity(${JSON.stringify(loc)})' style="flex:1">${loc.name}, ${loc.country_code}</span><button onclick='toggleFav(event, ${JSON.stringify(loc)})' style="background:none; border:none; font-size:1.2rem;">${isFav ? '❤️' : '🤍'}</button>`;
                resultsDiv.appendChild(d);
            });
        });

        function toggleFav(e, loc) { e.stopPropagation(); const idx = favorites.findIndex(f => f.id === loc.id); if (idx > -1) favorites.splice(idx, 1); else favorites.push(loc); localStorage.setItem('clouds_favs', JSON.stringify(favorites)); renderFavorites(); document.getElementById('city-input').value = ''; document.getElementById('results').innerHTML = ''; }
        function renderFavorites() { const list = document.getElementById('favorites-list'); list.innerHTML = ''; favorites.forEach(loc => { const d = document.createElement('div'); d.className = 'fav-item'; d.innerHTML = `<span onclick='selectCity(${JSON.stringify(loc)})' style="flex:1; cursor:pointer;">${loc.name}</span> <button onclick='toggleFav(event, ${JSON.stringify(loc)})' style="background:none; border:none; color:white;">❤️</button>`; list.appendChild(d); }); }
        function selectCity(loc) { document.getElementById('city-label').innerText = loc.name; fetchWeather(loc.latitude, loc.longitude); closeAllSheets(); }

        window.onload = () => { applyTheme(); updateSettingsUI(); requestCurrentLocation(); };
    </script>
</body>
</html>
